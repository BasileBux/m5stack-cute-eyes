[env:m5stack-core2]
platform = espressif32@6.12.0
board = m5stack-core2
framework = arduino
upload_speed = 921600
monitor_speed = 115200
board_build.partitions = default_16MB.csv
build_type = debug
upload_port = /dev/ttyACM0
build_flags =
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=5
	; Allow multiple definitions to override ieee80211_raw_frame_sanity_check
    -Wl,-zmuldefs

lib_deps =
	m5stack/M5Unified@^0.2.17
	m5stack/M5GFX@^0.2.23
